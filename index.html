<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font-awesome icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- daisy+tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <!-- login page -->
    <section id="login-page" class="flex justify-center items-center min-h-screen">
        <div class="p-8 flex flex-col items-center">
            <!-- login header -->
            <div class="flex flex-col text-center mb-6">
                <div class="flex justify-center mb-6"><img src="assets/github-logo.png" alt=""></div>
                <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
                <p class="text-gray-700">Sign in to manage your issues</p>
            </div>

            <!-- login body -->
            <div class="flex flex-col mb-6 space-y-2.5">
                <label for="" class="font-semibold">Username</label>
                <input id="user-name" value="admin" class="input w-96" type="text" placeholder="Enter Username">
                <span class="text-fuchsia-900 text-sm font-semibold">Default: admin</span>
                <label for="" class="font-semibold">Password</label>
                <input id="password" value="admin123" class="input w-96" type="text" placeholder="Enter Password">
                <span class="text-fuchsia-900 text-sm font-semibold">Default: admin123</span>
            </div>

            <button id="login-btn" class="btn bg-[#622069] text-white text-[16px] w-96">Login with Slack</button>
            <p class="text-gray-500 text-[16px] font-semibold my-6">OR</p>

            <!-- login footer -->
            <div class="">
                <p class="text-gray-500 text-sm mb-8">Demo Credentials:</p>
                <p class="font-semibold">Username: <span class="text-gray-500">admin</span></p>
                <p class="font-semibold">Password: <span class="text-gray-500">admin123</span></p>
            </div>
        </div>
    </section>

    <!-- main section -->
    <section id="main-page" class="bg-[#FBFBFB] hidden">

        <!-- navigation section -->
        <div class="navbar justify-between mb-14 bg-base-100 shadow-2xl w-11/12 mx-auto sticky top-0">
            <div class="flex items-center gap-1">
                <img class="w-9" src="assets/github-logo.png" alt="">
                <h2 class="text-2xl font-semibold text-gray-500">GitHub Issues Tracker</h2>
            </div>

            <div class="flex gap-4">
                <div class="flex input">
                    <i class="text-gray-400 fa-solid fa-magnifying-glass"></i>
                    <input id="search-input" type="text" placeholder="Search issues..." />
                </div>
                <button class="btn bg-[#622069] text-white text-[16px]">+ New Issue</button>
            </div>
        </div>

        <section class="w-10/12 mx-auto">
            <!-- toggle button -->
            <div class="navbar gap-2 bg-base-100 shadow-md mb-4">
                <button onclick="filterIssues('all', event)"
                    class="toggle-btn btn w-28 btn-primary border-gray-300 border">All</button>
                <button onclick="filterIssues('open', event)"
                    class=" toggle-btn btn w-28 border-gray-300 border">Open</button>
                <button onclick="filterIssues('closed', event)"
                    class=" toggle-btn btn w-28 border-gray-300 border">Closed</button>
            </div>

            <!-- issues tracker -->
            <div class="flex justify-between bg-base-100 shadow-xl p-6">
                <div class="flex items-center gap-2">
                    <div class="p-2.5 bg-sky-100 rounded-full">
                        <img src="assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h2 id="issue-count" class="text-xl font-semibold">50 Issues</h2>
                        <p class="text-gray-600 font-semibold">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex gap-4">
                    <p class="font-medium text-gray-700 flex gap-2 items-center"><span
                            class="w-3 h-3 btn-circle bg-sky-800"></span>Open</p>
                    <p class="font-medium text-gray-700 flex gap-2 items-center"><span
                            class="w-3 h-3 btn-circle bg-fuchsia-900"></span>Closed</p>
                </div>
            </div>

            <!-- all cards -->
            <div id="issue-container" class="p-6 mb-14 grid grid-cols-4 gap-3">
            </div>

            <!-- modal section -->
            <div id="show-hide-modal" class="fixed inset-0 bg-[#00A96E]/30 flex items-center justify-center hidden">

                <!-- modal container -->
                <div id="modal-content" class="space-y-6 bg-white p-6 rounded-lg w-[700px]">

                </div>
            </div>
        </section>
    </section>
    <script src="script.js"></script>
</body>

</html>
